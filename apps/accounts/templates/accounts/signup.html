{% extends "base_public.html" %}

{% block title %}Create account{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-3xl bg-white p-8 shadow-xl shadow-slate-200">
  <h1 class="text-3xl font-bold text-slate-900">Create landlord account</h1>
  <form method="post" class="mt-6 grid gap-4 sm:grid-cols-2">
    {% csrf_token %}
    {% for field in form %}
      <div class="{% if field.name in 'password1 password2' %}sm:col-span-2{% endif %}">
        <label class="text-sm font-medium text-slate-700">{{ field.label }}</label>
        {{ field }}
        <div class="mt-1 text-sm text-rose-600">{{ field.errors }}</div>
      </div>
    {% endfor %}
    <div class="sm:col-span-2">
      <button type="submit" class="rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Create account</button>
    </div>
  </form>
</div>
{% endblock %}
