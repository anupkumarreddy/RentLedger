{% extends "base_public.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-3xl bg-white p-8 shadow-xl shadow-slate-200">
  <h1 class="text-3xl font-bold text-slate-900">Reset password</h1>
  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Send reset link</button>
  </form>
</div>
{% endblock %}
