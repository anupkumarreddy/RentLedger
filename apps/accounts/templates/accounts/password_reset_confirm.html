{% extends "base_public.html" %}

{% block title %}Set new password{% endblock %}

{% block content %}
<div class="mx-auto max-w-md auth-card">
  <h1 class="text-3xl font-bold tracking-tight text-slate-900">Set new password</h1>
  <form method="post" class="mt-6 space-y-5">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="field-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="form-error">{{ field.errors }}</div>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn-primary w-full">Update password</button>
  </form>
</div>
{% endblock %}
