{% extends "base_public.html" %}

{% block title %}Sign in{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-3xl bg-white p-8 shadow-xl shadow-slate-200">
  <h1 class="text-3xl font-bold text-slate-900">Sign in</h1>
  <p class="mt-2 text-sm text-slate-600">Access your landlord workspace.</p>
  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <div>
        <label class="text-sm font-medium text-slate-700">{{ field.label }}</label>
        {{ field }}
        <div class="mt-1 text-sm text-rose-600">{{ field.errors }}</div>
      </div>
    {% endfor %}
    <button type="submit" class="w-full rounded-full bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Sign in</button>
  </form>
  <div class="mt-6 flex justify-between text-sm text-slate-600">
    <a href="{% url 'accounts:signup' %}">Create account</a>
    <a href="{% url 'password_reset' %}">Forgot password</a>
  </div>
</div>
{% endblock %}
