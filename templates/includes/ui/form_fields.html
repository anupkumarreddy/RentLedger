{% for field in form %}
  <div class="{% if field.name in full_width_fields %}md:col-span-2{% endif %}">
    <label class="field-label">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<p class="form-help">{{ field.help_text }}</p>{% endif %}
    {% if field.errors %}<div class="form-error">{{ field.errors }}</div>{% endif %}
  </div>
{% endfor %}
