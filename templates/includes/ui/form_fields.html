{% for field in form %}
  <div class="form-row{% if field.name in full_width_fields %} form-row-full{% endif %}">
    <div class="form-row-label">
      <label class="field-label">{{ field.label }}</label>
      {% if field.help_text %}<p class="form-help sm:pr-6">{{ field.help_text }}</p>{% endif %}
      {% if field.field.required %}<p class="mt-2 text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-400">Required</p>{% endif %}
    </div>
    <div class="form-row-field">
      {{ field }}
      {% if field.errors %}<div class="form-error">{{ field.errors }}</div>{% endif %}
    </div>
  </div>
{% endfor %}
